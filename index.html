<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notion → HTML 변환기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── 라이트 모드 (기본) ── */
  :root {
    --bg:          #ffffff;
    --surface:     #f5f5f4;
    --surface2:    #ebebea;
    --border:      #d4d4d2;
    --border2:     #b8b8b5;
    --text:        #1a1a18;   /* on white: 16.9:1 */
    --text2:       #3d3d3a;   /* on white:  9.1:1 */
    --text3:       #595956;   /* on white:  5.9:1 */
    --accent:      #1a6b2e;   /* green, on white:  7.2:1 */
    --accent-bg:   #e6f4ea;
    --accent-dim:  rgba(26,107,46,0.08);
    --accent-dim2: rgba(26,107,46,0.15);
    --accent-text: #1a6b2e;  /* on accent-bg: 6.1:1 */
    --warn:        #7a3f00;   /* on warn-bg:   5.2:1 */
    --warn-bg:     #fff3e0;
    --warn-border: rgba(122,63,0,0.2);
    --dot-in:      #1458c2;
    --dot-out:     #1a6b2e;
    --btn-primary-text: #ffffff;
    --logo-icon: #ffffff;
    --font: 'Noto Sans KR', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  /* ── 다크 모드 ── */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #111110;
      --surface:     #1c1c1a;
      --surface2:    #252522;
      --border:      #2e2e2b;
      --border2:     #3d3d3a;
      --text:        #f0ede8;   /* on #111: 16.1:1 */
      --text2:       #b8b5ae;   /* on #111:  7.4:1 */
      --text3:       #88857e;   /* on #111:  4.6:1 */
      --accent:      #7dd87a;   /* green, on #111:  8.3:1 */
      --accent-bg:   #1a2e1a;
      --accent-dim:  rgba(125,216,122,0.08);
      --accent-dim2: rgba(125,216,122,0.15);
      --accent-text: #7dd87a;
      --warn:        #ffb74d;   /* on #1c1c1a: 5.5:1 */
      --warn-bg:     #2a1f0e;
      --warn-border: rgba(255,183,77,0.2);
      --dot-in:      #6b9fff;
      --dot-out:     #7dd87a;
      --btn-primary-text: #1a1a18;
      --logo-icon: #1a1a18;
    }
  }

  html {
    height: 100%;
    overflow: hidden;
  }

  body {
    height: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 16px; height: 16px; }
  .logo-mark svg path { stroke: var(--logo-icon); }

  .logo-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--text3);
    font-weight: 300;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    font-size: 11px;
    color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 20px;
    font-family: var(--mono);
  }

  /* ── Layout ── */
  .workspace {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    min-height: 0;
  }

  .pane {
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  .pane:first-child {
    border-right: 1px solid var(--border);
  }

  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .pane-label {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
  }

  .pane-label span {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 7px;
    position: relative;
    top: -1px;
  }

  .pane-label .dot-in  { background: var(--dot-in); }
  .pane-label .dot-out { background: var(--dot-out); }

  .pane-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Textarea ── */
  .input-area {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }

  textarea {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    padding: 20px;
    caret-color: var(--accent);
  }

  textarea::placeholder {
    color: var(--text3);
    line-height: 2;
  }

  /* ── Output ── */
  .output-area {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 20px;
    background: var(--bg);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    color: var(--text2);
    white-space: pre-wrap;
    word-break: break-all;
  }

  .output-area.has-content { color: var(--text); }

  .output-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }

  .output-empty svg { opacity: 0.3; }

  .output-empty p {
    font-size: 13px;
    text-align: center;
    line-height: 1.7;
  }

  /* ── Bottom bar ── */
  .pane-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .char-count {
    font-size: 13px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--btn-primary-text);
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  .btn-copy {
    background: var(--accent-dim);
    color: var(--accent-text);
    border: 1px solid var(--accent-dim2);
  }
  .btn-copy:hover { background: var(--accent-dim2); }
  .btn-copy.copied { background: var(--accent-dim2); color: var(--accent-text); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s ease;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

  /* ── Warning chips ── */
  .warn-bar {
    display: none;
    padding: 8px 20px;
    background: var(--warn-bg);
    border-bottom: 1px solid var(--warn-border);
    font-size: 12px;
    color: var(--warn);
    gap: 6px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .warn-bar.visible { display: flex; }
  .warn-bar strong { font-weight: 500; flex-shrink: 0; margin-top: 1px; }
  .warn-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .warn-chip {
    background: var(--warn-border);
    border: 1px solid var(--warn-border);
    color: var(--warn);
    padding: 1px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-family: var(--mono);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Image toolbar ── */
  .img-toolbar {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .img-toolbar-btns {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
  }

  .img-toggle-btn {
    font-size: 12px;
    padding: 5px 12px;
  }

  .img-form {
    padding: 10px 16px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .img-form-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text3);
    margin-bottom: 2px;
  }

  .img-form-close {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 12px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
  }
  .img-form-close:hover { color: var(--text); }

  .img-form-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .img-form-label {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    width: 44px;
    flex-shrink: 0;
  }

  .img-input {
    flex: 1;
    height: 30px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 0 10px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }

  .img-input:focus { border-color: var(--accent); }
  .img-input::placeholder { color: var(--text3); }

  .img-path-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    overflow: hidden;
    min-width: 0;
    transition: border-color 0.15s;
  }
  .img-path-wrap:focus-within { border-color: var(--accent); }

  .img-path-prefix {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
    background: var(--surface2);
    padding: 0 8px;
    height: 30px;
    line-height: 30px;
    white-space: nowrap;
    flex-shrink: 0;
    border-right: 1px solid var(--border2);
  }

  .img-input-file {
    border: none;
    border-radius: 0;
    background: transparent;
    flex: 1;
    min-width: 0;
  }
  .img-input-file:focus { border-color: transparent; }

  /* ── Table form ── */
  .table-grid-setup {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .table-grid-setup input[type="number"] {
    width: 52px;
  }

  .table-type-select {
    display: flex;
    gap: 6px;
  }

  .table-type-btn {
    font-size: 12px;
    padding: 5px 10px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border2);
  }

  .table-type-btn.active {
    background: var(--accent-dim);
    color: var(--accent-text);
    border-color: var(--accent-dim2);
  }

  .table-grid-wrap {
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    background: var(--bg);
  }

  .table-grid-row {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
  }

  .table-grid-row:last-child { margin-bottom: 0; }

  .table-cell-input {
    flex: 1;
    min-width: 0;
    height: 28px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 0 8px;
    font-size: 12px;
    font-family: var(--font);
    color: var(--text);
    outline: none;
  }

  .table-cell-input:focus { border-color: var(--accent); }

  .table-cell-input.is-header {
    background: var(--surface2);
    font-weight: 500;
  }

  .table-caption-note {
    font-size: 11px;
    color: var(--text3);
  }

  /* ── Tab option ── */

  .tab-option {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text3);
    cursor: pointer;
    user-select: none;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .tab-option:hover { color: var(--text2); border-color: var(--border2); }
  .tab-option input[type="checkbox"] {
    accent-color: var(--accent);
    width: 13px;
    height: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M3 4h10M3 8h7M3 12h9" stroke="#0f0f0f" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Notion → HTML 변환기</div>
      <div class="logo-sub">마크다운을 붙여넣고 변환하세요</div>
    </div>
  </div>
  <div class="header-right">
    <span class="badge">v1.0</span>
  </div>
</header>

<div class="workspace">

  <!-- 입력 패널 -->
  <div class="pane">
    <div class="pane-header">
      <div class="pane-label"><span class="dot-in"></span>노션 마크다운 입력</div>
    </div>
    <div class="input-area">
      <textarea id="input" placeholder="노션에서 복사한 내용을 여기에 붙여넣으세요.

지원 요소:
  # 제목 (h2) — 본문 최상위 헤딩
  ## 헤딩 (h3)
  ### 헤딩 (h4)
  #### 미정의 (주석 처리)
  기본 본문 → body1
  [body1_b] 단락 전체 굵은 본문
  [body3] body3 본문
  **인라인 볼드** → strong
  `인라인 코드` → code
  ```코드 블록``` → pre>code
  --- → hr
  [링크명](URL) → a (새 창)
  > 인용 → blockquote
  - 목록 / 1. 순서 목록
  ![alt](경로) → figure>img"></textarea>
    </div>

    <!-- 이미지 보조 UI -->
    <div class="img-toolbar">
      <div class="img-toolbar-btns">
        <button class="btn btn-ghost img-toggle-btn" onclick="toggleImgForm('single')">1단 이미지 추가</button>
        <button class="btn btn-ghost img-toggle-btn" onclick="toggleImgForm('grid')">2단 이미지 추가</button>
        <button class="btn btn-ghost img-toggle-btn" onclick="toggleImgForm('audio')">오디오 추가</button>
        <button class="btn btn-ghost img-toggle-btn" onclick="toggleImgForm('table')">표 추가</button>
      </div>

      <!-- 표 폼 -->
      <div class="img-form" id="formTable" style="display:none;">
        <div class="img-form-title">
          <span>표 삽입</span>
          <button class="img-form-close" onclick="toggleImgForm('table')">✕</button>
        </div>

        <div class="table-type-select">
          <button type="button" class="btn table-type-btn active" data-type="h" onclick="setTableType('h')">가로형</button>
          <button type="button" class="btn table-type-btn" data-type="v" onclick="setTableType('v')">세로형</button>
          <button type="button" class="btn table-type-btn" data-type="x" onclick="setTableType('x')">교차형</button>
        </div>

        <div class="table-grid-setup">
          <span class="img-form-label" style="width:auto;">행</span>
          <input type="number" class="img-input" id="t_rows" value="2" min="1" max="20">
          <span class="img-form-label" style="width:auto;">열</span>
          <input type="number" class="img-input" id="t_cols" value="3" min="1" max="10">
          <button class="btn btn-ghost" style="font-size:12px;padding:5px 10px;" onclick="buildTableGrid()">그리드 생성</button>
        </div>

        <div class="table-grid-wrap" id="tableGridWrap">
          <span class="table-caption-note">행/열 개수를 정하고 "그리드 생성"을 누르세요.</span>
        </div>

        <span class="table-caption-note">표 제목(caption)은 변환 후 결과 화면에서 직접 입력하세요.</span>

        <div style="display:flex;justify-content:flex-end;margin-top:6px;">
          <button class="btn btn-primary" onclick="insertTable()">삽입</button>
        </div>
      </div>


      <!-- 오디오 폼 -->
      <div class="img-form" id="formAudio" style="display:none;">
        <div class="img-form-title">
          <span>오디오</span>
          <button class="img-form-close" onclick="toggleImgForm('audio')">✕</button>
        </div>
        <div class="img-form-row">
          <input class="img-input" id="a_src" placeholder="파일명.mp3 (필수)">
          <button class="btn btn-primary" onclick="insertAudio()">삽입</button>
        </div>
      </div>

      <!-- 1단 폼 -->
      <div class="img-form" id="formSingle" style="display:none;">
        <div class="img-form-title">
          <span>1단 이미지</span>
          <button class="img-form-close" onclick="toggleImgForm('single')">✕</button>
        </div>
        <div class="img-form-row">
          <input class="img-input" id="s_src" placeholder="파일명.jpg (필수)">
          <input class="img-input" id="s_alt" placeholder="alt 텍스트">
          <input class="img-input" id="s_cap" placeholder="캡션 (선택 — 입력 시 alt 공란)">
          <button class="btn btn-primary" onclick="insertSingle()">삽입</button>
        </div>
      </div>

      <!-- 2단 폼 -->
      <div class="img-form" id="formGrid" style="display:none;">
        <div class="img-form-title">
          <span>2단 이미지</span>
          <button class="img-form-close" onclick="toggleImgForm('grid')">✕</button>
        </div>
        <div class="img-form-row">
          <span class="img-form-label">이미지 1</span>
          <input class="img-input" id="g_src1" placeholder="파일명.jpg (필수)">
          <input class="img-input" id="g_alt1" placeholder="alt">
          <input class="img-input" id="g_cap1" placeholder="캡션 (선택)">
        </div>
        <div class="img-form-row">
          <span class="img-form-label">이미지 2</span>
          <input class="img-input" id="g_src2" placeholder="파일명.jpg (필수)">
          <input class="img-input" id="g_alt2" placeholder="alt">
          <input class="img-input" id="g_cap2" placeholder="캡션 (선택)">
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:6px;">
          <button class="btn btn-primary" onclick="insertGrid()">삽입</button>
        </div>
      </div>
    </div>

    <div class="pane-footer">
      <span class="char-count" id="charCount">0자</span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost" onclick="clearInput()">초기화</button>
        <button class="btn btn-primary" onclick="convert()">변환하기</button>
      </div>
    </div>
  </div>

  <!-- 출력 패널 -->
  <div class="pane">
    <div class="pane-header">
      <div class="pane-label"><span class="dot-out"></span>HTML 결과</div>
    </div>
    <div class="warn-bar" id="warnBar">
      <strong>⚠ 미변환 요소:</strong>
      <div class="warn-chips" id="warnChips"></div>
    </div>
    <div class="output-area" id="outputWrap" style="padding:0;">
      <div class="output-empty" id="outputEmpty">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect x="6" y="8" width="28" height="24" rx="3" stroke="#888" stroke-width="1.5"/>
          <path d="M12 16h16M12 21h10M12 26h13" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p>왼쪽에 노션 마크다운을 붙여넣고<br>"변환하기" 버튼을 누르세요.</p>
      </div>
      <textarea id="output" style="display:none;width:100%;height:100%;background:var(--bg);color:var(--text);border:none;outline:none;resize:none;font-family:var(--mono);font-size:13px;line-height:1.8;padding:20px;"></textarea>
    </div>
    <div class="pane-footer">
      <span class="char-count" id="lineCount"></span>
      <div style="display:flex;align-items:center;gap:6px;">
        <label class="tab-option" id="tabOption">
          <input type="checkbox" id="tabCheck" checked>
          <span>탭 추가하기</span>
        </label>
        <button class="btn btn-copy" id="copyBtn" onclick="copyOutput()" disabled>복사하기</button>
        <button class="btn btn-ghost" id="downloadBtn" onclick="downloadOutput()" disabled>다운로드</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toastMsg">클립보드에 복사됐습니다.</span>
</div>

<script>
// ── 글자 수 카운터 ──
const inputEl = document.getElementById('input');
inputEl.addEventListener('input', () => {
  document.getElementById('charCount').textContent = inputEl.value.length.toLocaleString() + '자';
});

// ── 초기화 ──
function clearInput() {
  inputEl.value = '';
  document.getElementById('charCount').textContent = '0자';
}

// ── 이미지 보조 UI 토글 ──
function toggleImgForm(type) {
  const single = document.getElementById('formSingle');
  const grid   = document.getElementById('formGrid');
  const audio  = document.getElementById('formAudio');
  const table  = document.getElementById('formTable');
  const all = { single, grid, audio, table };
  const target = all[type];
  const isOpen = target.style.display !== 'none';
  Object.values(all).forEach(f => f.style.display = 'none');
  if (!isOpen) target.style.display = 'flex';
}

// ── 커서 위치에 텍스트 삽입 ──
function insertAtCursor(text) {
  const el = inputEl;
  const start = el.selectionStart;
  const end   = el.selectionEnd;
  const before = el.value.substring(0, start);
  const after  = el.value.substring(end);
  const prefix = before.length > 0 && !before.endsWith('\n') ? '\n' : '';
  el.value = before + prefix + text + '\n' + after;
  const pos = before.length + prefix.length + text.length + 1;
  el.setSelectionRange(pos, pos);
  el.focus();
  document.getElementById('charCount').textContent = el.value.length.toLocaleString() + '자';
}

const IMG_BASE = '/img/contents/';

// ── 1단 이미지 삽입 ──
function insertSingle() {
  const file = document.getElementById('s_src').value.trim();
  const alt  = document.getElementById('s_alt').value.trim();
  const cap  = document.getElementById('s_cap').value.trim();
  if (!file) { showToast('파일명을 입력하세요.'); return; }
  const src = IMG_BASE + file;
  const md = cap ? '![](' + src + ') ' + cap : '![' + alt + '](' + src + ')';
  insertAtCursor(md);
  ['s_src','s_alt','s_cap'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('formSingle').style.display = 'none';
  showToast('1단 이미지가 삽입됐습니다.');
}

// ── 2단 이미지 삽입 ──
function insertGrid() {
  const file1 = document.getElementById('g_src1').value.trim();
  const alt1  = document.getElementById('g_alt1').value.trim();
  const cap1  = document.getElementById('g_cap1').value.trim();
  const file2 = document.getElementById('g_src2').value.trim();
  const alt2  = document.getElementById('g_alt2').value.trim();
  const cap2  = document.getElementById('g_cap2').value.trim();
  if (!file1 || !file2) { showToast('두 이미지 파일명을 모두 입력하세요.'); return; }
  const src1 = IMG_BASE + file1;
  const src2 = IMG_BASE + file2;
  const img1 = cap1 ? '![](' + src1 + ') ' + cap1 : '![' + alt1 + '](' + src1 + ')';
  const img2 = cap2 ? '![](' + src2 + ') ' + cap2 : '![' + alt2 + '](' + src2 + ')';
  const md = '[grid]\n' + img1 + '\n' + img2 + '\n[/grid]';
  insertAtCursor(md);
  ['g_src1','g_alt1','g_cap1','g_src2','g_alt2','g_cap2'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('formGrid').style.display = 'none';
  showToast('2단 이미지가 삽입됐습니다.');
}

// ── 오디오 삽입 ──
function insertAudio() {
  const file = document.getElementById('a_src').value.trim();
  if (!file) { showToast('파일명을 입력하세요.'); return; }
  const md = '[audio]' + file + '[/audio]';
  insertAtCursor(md);
  document.getElementById('a_src').value = '';
  document.getElementById('formAudio').style.display = 'none';
  showToast('오디오가 삽입됐습니다.');
}

// ── 표 삽입 ──
let currentTableType = 'h';

function setTableType(type) {
  currentTableType = type;
  document.querySelectorAll('.table-type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });
  buildTableGrid();
}

function buildTableGrid() {
  const rows = Math.max(1, Math.min(20, parseInt(document.getElementById('t_rows').value, 10) || 1));
  const cols = Math.max(1, Math.min(10, parseInt(document.getElementById('t_cols').value, 10) || 1));
  const wrap = document.getElementById('tableGridWrap');
  wrap.innerHTML = '';

  // 셀이 제목(th)인지 여부를 유형별로 결정
  // h: 1행 전체가 제목
  // v: 각 행의 1열이 제목
  // x: 1행 전체 + 각 행의 1열이 제목
  const isHeaderCell = (r, c) => {
    if (currentTableType === 'h') return r === 0;
    if (currentTableType === 'v') return c === 0;
    if (currentTableType === 'x') return r === 0 || c === 0;
    return false;
  };

  for (let r = 0; r < rows; r++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'table-grid-row';
    for (let c = 0; c < cols; c++) {
      const input = document.createElement('input');
      input.className = 'table-cell-input' + (isHeaderCell(r, c) ? ' is-header' : '');
      input.dataset.row = r;
      input.dataset.col = c;
      input.placeholder = isHeaderCell(r, c) ? '제목셀' : '내용셀';
      rowEl.appendChild(input);
    }
    wrap.appendChild(rowEl);
  }
}

function insertTable() {
  const wrap = document.getElementById('tableGridWrap');
  const inputs = wrap.querySelectorAll('.table-cell-input');
  if (inputs.length === 0) { showToast('먼저 그리드를 생성하세요.'); return; }

  const rows = Math.max(1, Math.min(20, parseInt(document.getElementById('t_rows').value, 10) || 1));
  const cols = Math.max(1, Math.min(10, parseInt(document.getElementById('t_cols').value, 10) || 1));

  const grid = [];
  for (let r = 0; r < rows; r++) {
    const rowVals = [];
    for (let c = 0; c < cols; c++) {
      const el = wrap.querySelector('.table-cell-input[data-row="' + r + '"][data-col="' + c + '"]');
      rowVals.push(el ? el.value.trim() : '');
    }
    grid.push(rowVals.join('|'));
  }

  const md = '[table:' + currentTableType + ']\n' + grid.join('\n') + '\n[/table]';
  insertAtCursor(md);
  document.getElementById('formTable').style.display = 'none';
  showToast('표가 삽입됐습니다.');
}

function convert() {
  const raw = inputEl.value;
  if (!raw.trim()) { showToast('입력된 내용이 없습니다.'); return; }

  const lines = raw.split('\n');
  const output = [];
  const warnings = new Set();

  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    // ── 오디오 [audio] ──
    if (line.startsWith('[audio]') && line.endsWith('[/audio]')) {
      const file = line.slice(7, -8).trim();
      const src = '/audio/contents/' + file;
      output.push('<audio controls controlsList="nodownload">\n  <source src="' + src + '" type="audio/mpeg">\n  사용 중인 브라우저가 오디오 태그를 지원하지 않습니다.\n</audio>');
      i++; continue;
    }

    // ── 코드 블록 (```) ──
    if (line.startsWith('```')) {
      const codeLang = line.slice(3).trim();
      const codeLines = [];
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) {
        codeLines.push(escapeHtml(lines[i]));
        i++;
      }
      // code 내 첫 번째 구문 들여쓰기 없음 → 이미 그대로 유지
      output.push('<pre><code>' + codeLines.join('\n') + '</code></pre>');
      i++;
      continue;
    }

    // ── 순서 없는 목록 ──
    if (/^(\s*)-\s/.test(line)) {
      const listLines = [];
      while (i < lines.length && /^(\s*)-\s/.test(lines[i])) {
        listLines.push(lines[i]);
        i++;
      }
      output.push(buildUl(listLines));
      continue;
    }

    // ── 순서 있는 목록 ──
    if (/^(\s*)\d+\.\s/.test(line)) {
      const listLines = [];
      while (i < lines.length && /^(\s*)\d+\.\s/.test(lines[i])) {
        listLines.push(lines[i]);
        i++;
      }
      output.push(buildOl(listLines));
      continue;
    }

    // ── 인용 (Quotation) ──
    if (line.startsWith('> ')) {
      const quoteLines = [];
      while (i < lines.length && lines[i].startsWith('> ')) {
        quoteLines.push(lines[i].slice(2));
        i++;
      }
      const inner = quoteLines.map(l => inlineConvert(l)).join('<br>');
      output.push('<blockquote>' + inner + '</blockquote>');
      continue;
    }

    // ── 빈 인용 줄 (노션 템플릿의 > 빈줄) ──
    if (line === '>') { i++; continue; }

    // ── 수평선 ──
    if (line.trim() === '---') { output.push('<hr>'); i++; continue; }

    // ── 헤딩 (볼드 변환 제외) ──
    if (line.startsWith('#### ')) {
      output.push('<!-- [미정의] h5 불가: ' + line.slice(5) + ' -->');
      warnings.add('####(h5 없음)');
      i++; continue;
    }
    if (line.startsWith('### '))  { output.push('<h4>' + headingConvert(line.slice(4)) + '</h4>'); i++; continue; }
    if (line.startsWith('## '))   { output.push('<h3>' + headingConvert(line.slice(3)) + '</h3>'); i++; continue; }
    if (line.startsWith('# '))    { output.push('<h2>' + headingConvert(line.slice(2)) + '</h2>'); i++; continue; }

    // ── 2단 이미지 [grid] 블록 ──
    if (line.trim() === '[grid]') {
      const imgLines = [];
      i++;
      while (i < lines.length && lines[i].trim() !== '[/grid]') {
        imgLines.push(lines[i]);
        i++;
      }
      i++; // [/grid] 건너뜀
      const figures = imgLines.map(l => {
        const m = l.match(/^!\[([^\]]*)\]\(([^)]+)\)(.*)$/);
        if (!m) return '';
        const alt = m[1], src = m[2], cap = m[3].trim();
        if (cap) {
          return '    <figure>\n        <img src="' + src + '" alt="">\n        <figcaption>' + escapeHtml(cap) + '</figcaption>\n    </figure>';
        } else {
          return '    <figure>\n        <img src="' + src + '" alt="' + escapeHtml(alt) + '">\n        <figcaption></figcaption>\n    </figure>';
        }
      }).filter(Boolean).join('\n');
      output.push('<div class="grid">\n' + figures + '\n</div>');
      continue;
    }

    // ── 이미지 ──
    const imgMatch = line.match(/^!\[([^\]]*)\]\(([^)]+)\)(.*)$/);
    if (imgMatch) {
      const alt = imgMatch[1], src = imgMatch[2], caption = imgMatch[3].trim();
      if (caption) {
        output.push('<figure>\n  <img src="' + src + '" alt="">\n  <figcaption>' + escapeHtml(caption) + '</figcaption>\n</figure>');
      } else {
        output.push('<figure>\n  <img src="' + src + '" alt="' + escapeHtml(alt) + '">\n</figure>');
      }
      i++; continue;
    }

    // ── Callout (aside) → 주석 처리 ──
    if (line.startsWith('<aside>') || line.trim() === '<aside>') {
      const asideLines = [line];
      i++;
      while (i < lines.length && !lines[i].includes('</aside>')) {
        asideLines.push(lines[i]);
        i++;
      }
      if (i < lines.length) asideLines.push(lines[i]);
      output.push('<!-- [보류] callout:\n' + asideLines.join('\n') + '\n-->');
      warnings.add('callout');
      i++; continue;
    }

    // ── 표 태그 [table:h/v/x] ~ [/table] ──
    if (/^\[table:[hvx]\]$/.test(line.trim())) {
      const type = line.trim().match(/^\[table:([hvx])\]$/)[1];
      const cellLines = [];
      i++;
      while (i < lines.length && lines[i].trim() !== '[/table]') {
        if (lines[i].trim() !== '') cellLines.push(lines[i]);
        i++;
      }
      i++; // [/table] 건너뜀
      const grid = cellLines.map(l => l.split('|').map(c => c.trim()));
      output.push(renderTable(type, grid));
      continue;
    }

    // ── 표준 마크다운 테이블 (태그 없이 붙여넣은 경우) → 가로형/세로형 자동 판단 ──
    if (line.startsWith('|')) {
      const tableLines = [];
      while (i < lines.length && lines[i].startsWith('|')) {
        tableLines.push(lines[i]);
        i++;
      }
      // 구분선(|---|---|) 줄은 제외
      const dataLines = tableLines.filter(l => !/^\|[\s:-]+\|[\s:|-]*$/.test(l.trim()));
      const grid = dataLines.map(l => {
        let cells = l.split('|').map(c => c.trim());
        // 맨 앞/뒤 빈 칸(파이프 시작/끝) 제거
        if (cells[0] === '') cells = cells.slice(1);
        if (cells[cells.length - 1] === '') cells = cells.slice(0, -1);
        return cells;
      });
      // 세로형 판단: 표준 마크다운 표에서 첫 열(맨 왼쪽 컬럼)에 값이 하나도 없으면
      // "행 제목을 넣을 자리가 없다"는 뜻이 아니라, 오히려 작성자가 첫 열을 라벨용으로
      // 비워둔 것이 아니라 데이터가 없는 것이므로 이 경우는 가로형으로 취급한다.
      // 반대로, 데이터 행(헤더 제외)의 첫 열에 값이 "전부" 들어있고 헤더 행 첫 칸만 비어있으면
      // 그 첫 열은 행 제목(th scope=row) 역할을 하는 세로형 표로 판단한다.
      const headerRow = grid[0] || [];
      const dataRows = grid.slice(1);
      const looksVertical = dataRows.length > 0 && dataRows.every(row => row[0]) && !headerRow[0];
      const type = looksVertical ? 'v' : 'h';
      const cleanedGrid = looksVertical ? dataRows : grid;
      output.push(renderTable(type, cleanedGrid));
      warnings.add('table(자동판단:' + (type === 'v' ? '세로형' : '가로형') + ')');
      continue;
    }

    // ── body1_b prefix ──
    if (line.startsWith('[body1_b]')) {
      output.push('<p class="body1_b">' + inlineConvert(line.slice(9).trim()) + '</p>');
      i++; continue;
    }

    // ── body3 prefix ──
    if (line.startsWith('[body3]')) {
      output.push('<p class="body3">' + inlineConvert(line.slice(7).trim()) + '</p>');
      i++; continue;
    }

    // ── 빈 줄 → br ──
    if (line.trim() === '') { output.push('<br>'); i++; continue; }

    // ── 기본 본문 → body1 ──
    output.push('<p class="body1">' + inlineConvert(line) + '</p>');
    i++;
  }

  // 연속 <br> 정리 (3개 이상 → 2개)
  let result = output.join('\n').replace(/(<br>\n?){3,}/g, '<br>\n<br>');

  // 탭 4개 옵션 적용
  const useTab = document.getElementById('tabCheck').checked;
  if (useTab) {
    const tabs = '\t\t\t\t';
    result = result.split('\n').map(l => tabs + l).join('\n');
  }

  // 출력
  const outEl = document.getElementById('output');
  outEl.value = result;
  outEl.style.display = 'block';
  document.getElementById('outputEmpty').style.display = 'none';

  // 버튼 활성화
  document.getElementById('copyBtn').disabled = false;
  document.getElementById('downloadBtn').disabled = false;

  // 하단 줄 수 표시
  const lineNum = output.filter(l => l !== '<br>').length;
  document.getElementById('lineCount').textContent = '변환된 요소 ' + lineNum + '개';

  // 경고
  const warnBar = document.getElementById('warnBar');
  const warnChips = document.getElementById('warnChips');
  if (warnings.size > 0) {
    warnChips.innerHTML = [...warnings].map(w => '<span class="warn-chip">' + w + '</span>').join('');
    warnBar.classList.add('visible');
  } else {
    warnBar.classList.remove('visible');
  }

  showToast('변환 완료!');
}

// ── 표 렌더링 (h: 가로형 / v: 세로형 / x: 교차형) ──
function renderTable(type, grid) {
  if (grid.length === 0) return '';

  let thead = '';
  let bodyRows = grid;

  if (type === 'h') {
    // 1행 전체가 th scope="col", 나머지는 전부 td
    const headerRow = grid[0];
    bodyRows = grid.slice(1);
    thead = '        <thead>\n            <tr>\n' +
      headerRow.map(c => '                <th scope="col">' + inlineConvert(c) + '</th>').join('\n') +
      '\n            </tr>\n        </thead>\n';
  } else if (type === 'x') {
    // 1행 전체가 th scope="col", 이후 각 행의 1열도 th scope="row"
    const headerRow = grid[0];
    bodyRows = grid.slice(1);
    thead = '        <thead>\n            <tr>\n' +
      headerRow.map(c => '                <th scope="col">' + inlineConvert(c) + '</th>').join('\n') +
      '\n            </tr>\n        </thead>\n';
  }
  // type === 'v'는 thead 없음, 전체가 tbody

  const tbodyRows = bodyRows.map(row => {
    const cells = row.map((cell, idx) => {
      const isRowHeader = (type === 'v' || type === 'x') && idx === 0;
      const tag = isRowHeader ? 'th' : 'td';
      const attr = isRowHeader ? ' scope="row"' : '';
      return '                <' + tag + attr + '>' + inlineConvert(cell) + '</' + tag + '>';
    }).join('\n');
    return '            <tr>\n' + cells + '\n            </tr>';
  }).join('\n');

  return '<div class="table">\n    <table>\n        <caption>캡션 입력</caption>\n' +
    thead +
    '        <tbody>\n' + tbodyRows + '\n        </tbody>\n    </table>\n</div>';
}

// ── 헤딩 전용 변환 (볼드 제외) ──
function headingConvert(text) {
  text = escapeHtml(text);
  // ** 마크다운 볼드는 그대로 텍스트로 유지 (strong 변환 안 함)
  text = text.replace(/\*\*([^*]+)\*\*/g, '$1');
  // 링크
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
    '<a href="$2" target="blank" title="새 창 열림">$1</a>');
  // 인라인 코드
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  return text;
}

// ── 인라인 변환 ──
function inlineConvert(text) {
  text = escapeHtml(text);
  // 마크다운 링크: [텍스트](URL) — 먼저 처리
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
    '<a href="$2" target="blank" title="새 창 열림">$1</a>');
  // 인라인 볼드: **텍스트**
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // 인라인 코드: `코드`
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // URL 자동 탐지: 마크다운 링크로 이미 변환된 부분 제외하고 남은 https?://... 처리
  text = text.replace(/(?<!href=&quot;)(?<!&quot;>)(https?:\/\/[^\s<&"]+)/g,
    '<a href="$1" target="blank" title="새 창 열림">$1</a>');
  return text;
}

// ── 순서 없는 목록 빌더 ──
function buildUl(lines) {
  const items = parseListItems(lines, '-');
  return renderUl(items);
}

function renderUl(items) {
  let html = '<ul>\n';
  for (const item of items) {
    if (item.children.length > 0) {
      html += '  <li>' + inlineConvert(item.text) + '\n    ' + renderUl(item.children).replace(/\n/g, '\n    ') + '\n  </li>\n';
    } else {
      html += '  <li>' + inlineConvert(item.text) + '</li>\n';
    }
  }
  html += '</ul>';
  return html;
}

// ── 순서 있는 목록 빌더 ──
function buildOl(lines) {
  const items = parseListItems(lines, 'ol');
  return renderOl(items);
}

function renderOl(items) {
  let html = '<ol>\n';
  for (const item of items) {
    if (item.children.length > 0) {
      html += '  <li>' + inlineConvert(item.text) + '\n    ' + renderOl(item.children).replace(/\n/g, '\n    ') + '\n  </li>\n';
    } else {
      html += '  <li>' + inlineConvert(item.text) + '</li>\n';
    }
  }
  html += '</ol>';
  return html;
}

// ── 목록 파싱 공통 ──
function parseListItems(lines, type) {
  const items = [];
  let i = 0;
  const isItem = (l) => type === '-' ? /^(\s*)-\s/.test(l) : /^(\s*)\d+\.\s/.test(l);
  const getIndent = (l) => l.match(/^(\s*)/)[1].length;
  const getText = (l) => type === '-' ? l.replace(/^\s*-\s/, '') : l.replace(/^\s*\d+\.\s/, '');

  const baseIndent = getIndent(lines[0]);

  while (i < lines.length) {
    const line = lines[i];
    if (!isItem(line)) { i++; continue; }
    const indent = getIndent(line);
    if (indent > baseIndent) { i++; continue; } // 하위는 부모에서 처리
    const text = getText(line);
    const children = [];
    // 다음 줄이 더 들여쓰기된 경우 → 자식
    i++;
    const childLines = [];
    while (i < lines.length && isItem(lines[i]) && getIndent(lines[i]) > indent) {
      childLines.push(lines[i]);
      i++;
    }
    if (childLines.length > 0) {
      const childItems = parseListItems(childLines, type);
      children.push(...childItems);
    }
    items.push({ text, children });
  }
  return items;
}

// ── HTML 이스케이프 ──
function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── 현재 결과 텍스트 가져오기 (사용자 직접 수정분 포함) ──
function getResult() {
  return document.getElementById('output').value;
}

// ── 복사 ──
function copyOutput() {
  const text = getResult();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    showToast('클립보드에 복사됐습니다.');
    setTimeout(() => btn.classList.remove('copied'), 2000);
  });
}

// ── 다운로드 ──
function downloadOutput() {
  const text = getResult();
  if (!text) return;

  // h1 텍스트 추출해서 파일명으로 사용
  const h1Match = inputEl.value.match(/^#\s+(.+)$/m);
  const rawTitle = h1Match ? h1Match[1].replace(/\*\*([^*]+)\*\*/g, '$1').trim() : 'converted';
  const fileName = rawTitle.replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '_') + '.html';

  const blob = new Blob([text], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  a.click();
  URL.revokeObjectURL(url);
  showToast('파일을 다운로드했습니다.');
}

// ── 토스트 ──
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}
</script>
